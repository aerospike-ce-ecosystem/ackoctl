version: 2

project_name: ackoctl

before:
  hooks:
    - go mod tidy

builds:
  - id: ackoctl
    main: ./cmd/ackoctl
    binary: ackoctl
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: ackoctl
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md
      - install.sh
      - docs/images/*

brews:
  - name: ackoctl
    ids: [ackoctl]
    repository:
      owner: aerospike-ce-ecosystem
      name: homebrew-tap
      branch: main
      token: "{{ .Env.GH_AW_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore(formula): bump {{ .ProjectName }} to {{ .Tag }}"
    directory: Formula
    homepage: https://github.com/aerospike-ce-ecosystem/ackoctl
    description: CLI for aerospike-cluster-manager
    license: Apache-2.0
    skip_upload: auto
    install: |
      bin.install "ackoctl"
    test: |
      system "#{bin}/ackoctl", "version"

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  draft: false
  prerelease: auto
  extra_files:
    # Ship install.sh alongside the per-OS tarballs so the curl-based
    # installer in README/docs can be served directly from the release
    # download URL once the repo is private or the install.sh on main
    # drifts from the released version.
    - glob: install.sh
