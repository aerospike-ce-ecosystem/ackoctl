version: 2

project_name: ackoctl

before:
  hooks:
    - go mod tidy

builds:
  - id: ackoctl
    main: ./cmd/ackoctl
    binary: ackoctl
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: ackoctl
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  draft: false
  prerelease: auto

brews:
  - name: ackoctl
    repository:
      owner: aerospike-ce-ecosystem
      name: homebrew-tap
      branch: main
    directory: Formula
    homepage: "https://github.com/aerospike-ce-ecosystem/ackoctl"
    description: "CLI for aerospike-cluster-manager — manage Aerospike CE clusters from the shell"
    license: "Apache-2.0"
    commit_author:
      name: goreleaserbot
      email: goreleaser@aerospike-ce-ecosystem
    install: |
      bin.install "ackoctl"
    test: |
      system "#{bin}/ackoctl version --short"
    skip_upload: auto
