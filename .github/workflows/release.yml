name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to aerospike-ce-ecosystem/homebrew-tap.
          # Required so goreleaser can push the bumped Formula/ackoctl.rb
          # across repos — the default GITHUB_TOKEN cannot reach a sibling
          # repository. If the secret is unset, brews.skip_upload=auto
          # leaves the release intact and only the formula bump is skipped.
          # Reuses the existing org-wide GH_AW_GITHUB_TOKEN secret rather
          # than minting a HOMEBREW_TAP_GITHUB_TOKEN dedicated to this flow.
          GH_AW_GITHUB_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}

      - name: Dispatch publish-packages workflow
        # Releases created above ran under GITHUB_TOKEN, so GitHub's
        # loop-prevention policy will suppress any `on: release` triggers.
        # We dispatch the apt/yum republish explicitly with a PAT instead.
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          gh workflow run publish-packages.yml \
            -R ${{ github.repository }} \
            -f tag=${{ github.ref_name }}
