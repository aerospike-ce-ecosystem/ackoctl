name: publish-packages

# Runs after the `release` workflow publishes a GitHub Release with .deb/.rpm
# assets attached by goreleaser. Pulls those assets, rebuilds the APT + YUM
# repository indexes, GPG-signs them, and pushes the result to gh-pages so
# `apt install ackoctl` / `yum install ackoctl` keep working without manual
# intervention.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to (re)publish (e.g. v0.1.1)'
        required: true

permissions:
  contents: write

concurrency:
  group: publish-packages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
      APT_SUITE: stable
      APT_COMPONENT: main
      YUM_CHANNEL: stable
    steps:
      - name: Checkout main (for scripts)
        uses: actions/checkout@v6
        with:
          ref: main
          path: main
          fetch-depth: 1

      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: pages
          fetch-depth: 1
        continue-on-error: true

      - name: Bootstrap gh-pages if missing
        run: |
          set -euo pipefail
          if [ ! -d pages/.git ]; then
            mkdir -p pages
            cd pages
            git init -b gh-pages
            git remote add origin "https://github.com/${{ github.repository }}.git"
          fi
          mkdir -p pages/apt/pool/main/a/ackoctl
          mkdir -p pages/apt/dists/${APT_SUITE}/${APT_COMPONENT}/binary-amd64
          mkdir -p pages/apt/dists/${APT_SUITE}/${APT_COMPONENT}/binary-arm64
          mkdir -p pages/yum/${YUM_CHANNEL}/x86_64
          mkdir -p pages/yum/${YUM_CHANNEL}/aarch64

      - name: Install repo-building tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            apt-utils createrepo-c gnupg rpm

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern '*.deb' \
            --pattern '*.rpm' \
            --dir artifacts
          ls -lh artifacts

      - name: Stage .deb into pool/
        run: |
          set -euo pipefail
          cp -v artifacts/*.deb pages/apt/pool/main/a/ackoctl/

      - name: Stage .rpm into yum channel (unsigned, signing happens after GPG import)
        run: |
          set -euo pipefail
          for f in artifacts/*.rpm; do
            arch=$(rpm -qp --qf '%{ARCH}' "$f")
            case "$arch" in
              x86_64|amd64)  dest=pages/yum/${YUM_CHANNEL}/x86_64 ;;
              aarch64|arm64) dest=pages/yum/${YUM_CHANNEL}/aarch64 ;;
              *) echo "unsupported rpm arch: $arch ($f)"; exit 1 ;;
            esac
            cp -v "$f" "$dest/"
          done

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [ -z "${GPG_PRIVATE_KEY:-}" ]; then
            echo "::error::GPG_PRIVATE_KEY secret is not set. See docs/release-setup.md."
            exit 1
          fi
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "use-agent"           > ~/.gnupg/gpg.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent || true
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/ {print $5; exit}')
          echo "GPG_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"
          gpg --batch --yes --armor --export "$KEY_ID" > pages/key.gpg
          echo "exported public key fingerprint: $KEY_ID"

      - name: Build APT repo metadata
        working-directory: pages/apt
        run: |
          set -euo pipefail
          for arch in amd64 arm64; do
            apt-ftparchive packages \
              --arch "$arch" \
              pool/main/a/ackoctl \
              > "dists/${APT_SUITE}/${APT_COMPONENT}/binary-${arch}/Packages"
            gzip -kf "dists/${APT_SUITE}/${APT_COMPONENT}/binary-${arch}/Packages"
          done

          cat > /tmp/apt-release.conf <<EOF
          APT::FTPArchive::Release::Origin "aerospike-ce-ecosystem";
          APT::FTPArchive::Release::Label  "ackoctl";
          APT::FTPArchive::Release::Suite  "${APT_SUITE}";
          APT::FTPArchive::Release::Codename "${APT_SUITE}";
          APT::FTPArchive::Release::Architectures "amd64 arm64";
          APT::FTPArchive::Release::Components "${APT_COMPONENT}";
          APT::FTPArchive::Release::Description "ackoctl APT repository";
          EOF

          apt-ftparchive -c /tmp/apt-release.conf \
            release "dists/${APT_SUITE}" > "dists/${APT_SUITE}/Release"

      - name: Sign APT Release
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        working-directory: pages/apt/dists/${{ env.APT_SUITE }}
        run: |
          set -euo pipefail
          rm -f Release.gpg InRelease
          gpg --batch --yes --pinentry-mode loopback \
              --passphrase "$GPG_PASSPHRASE" \
              --local-user "$GPG_KEY_ID" \
              --armor --detach-sign --output Release.gpg Release
          gpg --batch --yes --pinentry-mode loopback \
              --passphrase "$GPG_PASSPHRASE" \
              --local-user "$GPG_KEY_ID" \
              --clearsign --output InRelease Release

      - name: Sign individual .rpm packages
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          command -v rpmsign >/dev/null 2>&1 \
            || sudo apt-get install -y --no-install-recommends rpm
          KEY_NAME=$(gpg --list-keys --with-colons "$GPG_KEY_ID" \
                       | awk -F: '/^uid/ {print $10; exit}')
          # Pre-cache the passphrase in the gpg-agent so rpmsign's
          # loopback gpg invocation can sign non-interactively. The
          # alternative (injecting --passphrase via _gpg_sign_cmd_extra_args)
          # would put the secret on the gpg argv, which leaks via ps.
          echo "$GPG_PASSPHRASE" \
            | gpg --batch --yes --pinentry-mode loopback \
                  --passphrase-fd 0 --output /dev/null \
                  --local-user "$GPG_KEY_ID" \
                  --sign /etc/hostname >/dev/null 2>&1 || true
          cat > ~/.rpmmacros <<EOF
          %_signature gpg
          %_gpg_name $KEY_NAME
          %_gpg_sign_cmd_extra_args --pinentry-mode loopback --batch --no-secmem-warning --digest-algo sha256 --passphrase-file /tmp/.gpgpass
          EOF
          umask 077
          printf '%s' "$GPG_PASSPHRASE" > /tmp/.gpgpass
          for arch in x86_64 aarch64; do
            for rpm in pages/yum/${YUM_CHANNEL}/$arch/*.rpm; do
              [ -f "$rpm" ] || continue
              rpmsign --addsign "$rpm"
            done
          done
          shred -u /tmp/.gpgpass 2>/dev/null || rm -f /tmp/.gpgpass

      - name: Build YUM repo metadata
        working-directory: pages/yum/${{ env.YUM_CHANNEL }}
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          for arch in x86_64 aarch64; do
            createrepo_c --update "$arch"
            gpg --batch --yes --pinentry-mode loopback \
                --passphrase "$GPG_PASSPHRASE" \
                --local-user "$GPG_KEY_ID" \
                --detach-sign --armor \
                --output "$arch/repodata/repomd.xml.asc" \
                "$arch/repodata/repomd.xml"
          done

      - name: Emit .repo file and landing page
        run: |
          set -euo pipefail
          BASE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name || 'ackoctl' }}"
          cat > pages/yum/ackoctl.repo <<EOF
          [ackoctl]
          name=ackoctl ${YUM_CHANNEL}
          baseurl=${BASE}/yum/${YUM_CHANNEL}/\$basearch
          enabled=1
          gpgcheck=1
          repo_gpgcheck=1
          gpgkey=${BASE}/key.gpg
          EOF

          cat > pages/index.html <<EOF
          <!doctype html>
          <meta charset="utf-8">
          <title>ackoctl package repositories</title>
          <h1>ackoctl package repositories</h1>
          <p>Latest published tag: <code>${TAG}</code></p>
          <h2>APT</h2>
          <pre>
          curl -fsSL ${BASE}/key.gpg \\
            | sudo gpg --dearmor -o /etc/apt/keyrings/ackoctl.gpg
          echo "deb [signed-by=/etc/apt/keyrings/ackoctl.gpg] ${BASE}/apt ${APT_SUITE} ${APT_COMPONENT}" \\
            | sudo tee /etc/apt/sources.list.d/ackoctl.list
          sudo apt update &amp;&amp; sudo apt install ackoctl
          </pre>
          <h2>YUM/DNF</h2>
          <pre>
          sudo curl -fsSL ${BASE}/yum/ackoctl.repo -o /etc/yum.repos.d/ackoctl.repo
          sudo dnf install ackoctl
          </pre>
          <h2>Homebrew</h2>
          <pre>
          brew install aerospike-ce-ecosystem/tap/ackoctl
          </pre>
          EOF

      - name: Commit and push gh-pages
        working-directory: pages
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes to publish"
            exit 0
          fi
          git commit -m "publish: ${TAG}"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            HEAD:gh-pages
